name: Evolution

on:
  schedule:
    - cron: '0 */4 * * *'  # every 4 hours (bonus runs skip if no sponsors)
  workflow_dispatch:       # manual trigger for testing

permissions:
  contents: write
  issues: write

jobs:
  evolve:
    runs-on: ubuntu-latest
    timeout-minutes: 150

    steps:
      - name: Generate bot token
        id: bot-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ steps.bot-token.outputs.token }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Setup GitHub CLI
        run: gh auth status
        env:
          GH_TOKEN: ${{ steps.bot-token.outputs.token }}
          GH_PAT: ${{ secrets.GH_PAT }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Configure git
        run: |
          git config user.name "yoyo-evolve[bot]"
          git config user.email "yoyo-evolve[bot]@users.noreply.github.com"

      - name: Run evolution session
        id: attempt1
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          REPO: ${{ github.repository }}
          GH_TOKEN: ${{ steps.bot-token.outputs.token }}
          GH_PAT: ${{ secrets.GH_PAT }}
          FORCE_RUN: ${{ github.event_name == 'workflow_dispatch' && 'true' || '' }}
        run: |
          chmod +x scripts/evolve.sh
          ./scripts/evolve.sh

      - name: Retry after 15min
        id: attempt2
        if: steps.attempt1.outcome == 'failure'
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          REPO: ${{ github.repository }}
          GH_TOKEN: ${{ steps.bot-token.outputs.token }}
          GH_PAT: ${{ secrets.GH_PAT }}
          FORCE_RUN: ${{ github.event_name == 'workflow_dispatch' && 'true' || '' }}
        run: |
          echo "Waiting 15 minutes before retry..."
          sleep 900
          ./scripts/evolve.sh

      - name: Retry after 45min
        if: steps.attempt1.outcome == 'failure' && steps.attempt2.outcome == 'failure'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          REPO: ${{ github.repository }}
          GH_TOKEN: ${{ steps.bot-token.outputs.token }}
          GH_PAT: ${{ secrets.GH_PAT }}
          FORCE_RUN: ${{ github.event_name == 'workflow_dispatch' && 'true' || '' }}
        run: |
          echo "Waiting 45 minutes before retry..."
          sleep 2700
          ./scripts/evolve.sh

      - name: Check for clippy warnings
        if: always()
        run: cargo clippy --quiet --all-targets 2>&1 || true
